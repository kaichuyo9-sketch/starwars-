<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galactic+ Watchlist</title><style>
:root{
--yellow:#FFE81F;
--bg:#000;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* 🌌 BACKGROUND (VADER VS LUKE STYLE) */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-3;
background:
linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.95)),
url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
filter:brightness(0.6) contrast(1.2);
}

.stars{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(white 1px,transparent 1px);
background-size:60px 60px;
animation:move 120s linear infinite;
opacity:0.2;
z-index:-2;
}

@keyframes move{
from{transform:translateY(0)}
to{transform:translateY(-1000px)}
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

.logo{
color:var(--yellow);
font-weight:bold;
letter-spacing:2px;
}

.nav{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.nav a{
color:#aaa;
text-decoration:none;
font-size:13px;
}
.nav a:hover{color:white}

/* HERO */
.hero{
padding:40px 20px;
max-width:1000px;
margin:auto;
}

.hero h1{
font-size:clamp(24px,5vw,42px);
color:var(--yellow);
text-shadow:0 0 20px var(--yellow);
}

.hero p{color:#ccc;max-width:600px}

/* PROGRESS */
.progress{
margin:20px;
height:18px;
background:#222;
border-radius:20px;
overflow:hidden;
}

#bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#FFE81F,#ffb703);
color:black;
font-weight:bold;
font-size:12px;
text-align:center;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:15px;
}

.phase{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:15px;
margin-bottom:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

h2{
color:var(--yellow);
border-bottom:1px solid #333;
padding-bottom:5px;
}

h3{
color:#4da6ff;
}

.item{
display:flex;
align-items:center;
padding:8px;
transition:0.2s;
flex-wrap:wrap;
}

.item:hover{background:rgba(255,255,255,0.06)}

input{
accent-color:var(--yellow);
transform:scale(1.2);
}

label{
margin-left:10px;
flex:1;
}

/* RESPONSIVE */
@media(max-width:600px){
.header{flex-direction:column;align-items:flex-start}
.nav{flex-wrap:wrap}
.item{font-size:14px}
}
</style></head><body><div class="bg"></div>
<div class="stars"></div><div class="header">
<div class="logo">GALACTIC+</div>
<div class="nav">
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Series</a>
<a href="#">Watchlist</a>
</div>
</div><div class="hero">
<h1>Star Wars Universe Watchlist</h1>
<p>Complete cinematic tracker — optimized for mobile, tablet, and desktop.</p>
</div><div class="progress">
<div id="bar">0%</div>
</div><div class="container"><!-- PHASE 1 --><div class="phase">
<h2>Phase 1: The Foundation</h2>
<div class="item"><input type="checkbox" id="ep4"><label>Episode IV: A New Hope</label></div>
<div class="item"><input type="checkbox" id="ep5"><label>Episode V: Empire Strikes Back</label></div>
<div class="item"><input type="checkbox" id="ep6"><label>Episode VI: Return of the Jedi</label></div>
</div><!-- PHASE 2 --><div class="phase">
<h2>Phase 2: The Fall</h2>
<div class="item"><input type="checkbox" id="ep1"><label>Episode I: The Phantom Menace</label></div>
<div class="item"><input type="checkbox" id="ep2"><label>Episode II: Attack of the Clones</label></div>
<div class="item"><input type="checkbox" id="cw-movie"><label>The Clone Wars Movie</label></div><h3>The Clone Wars Series</h3>
<div class="item"><input type="checkbox" id="cw"><label>Seasons 1–7 (including Siege of Mandalore)</label></div><div class="item"><input type="checkbox" id="ep3"><label>Episode III: Revenge of the Sith</label></div>
</div><!-- PHASE 3 --><div class="phase">
<h2>Phase 3: Dark Times</h2>
<div class="item"><input type="checkbox" id="bb"><label>The Bad Batch</label></div>
<div class="item"><input type="checkbox" id="tj"><label>Tales of the Jedi</label></div>
<div class="item"><input type="checkbox" id="solo"><label>Solo: A Star Wars Story</label></div>
<div class="item"><input type="checkbox" id="kenobi"><label>Obi-Wan Kenobi</label></div>
<div class="item"><input type="checkbox" id="andor"><label>Andor</label></div>
<div class="item"><input type="checkbox" id="rebels"><label>Star Wars Rebels</label></div>
<div class="item"><input type="checkbox" id="rogue1"><label>Rogue One</label></div>
</div><!-- PHASE 4 --><div class="phase">
<h2>Phase 4: New Republic</h2>
<div class="item"><input type="checkbox" id="mando"><label>The Mandalorian</label></div>
<div class="item"><input type="checkbox" id="boba"><label>The Book of Boba Fett</label></div>
<div class="item"><input type="checkbox" id="ahsoka"><label>Ahsoka</label></div>
<div class="item"><input type="checkbox" id="skeleton"><label>Skeleton Crew</label></div>
</div><!-- PHASE 5 --><div class="phase">
<h2>Phase 5: Legacy</h2>
<div class="item"><input type="checkbox" id="res"><label>Resistance</label></div>
<div class="item"><input type="checkbox" id="ep7"><label>Episode VII: The Force Awakens</label></div>
<div class="item"><input type="checkbox" id="ep8"><label>Episode VIII: The Last Jedi</label></div>
<div class="item"><input type="checkbox" id="ep9"><label>Episode IX: The Rise of Skywalker</label></div>
</div></div><script>
const boxes=document.querySelectorAll("input");
const bar=document.getElementById("bar");

window.onload=()=>{
boxes.forEach(b=>b.checked=localStorage.getItem(b.id)==="true");
update();
};

boxes.forEach(b=>{
b.addEventListener("change",()=>{
localStorage.setItem(b.id,b.checked);
update();
});
});

function update(){
let total=boxes.length;
let done=[...boxes].filter(x=>x.checked).length;
let p=Math.round((done/total)*100);
bar.style.width=p+"%";
bar.innerText=p+"%";
}
</script></body>
</html>
