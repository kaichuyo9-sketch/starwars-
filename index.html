<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galactic+ | Star Wars Watch Hub</title><style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0f;
color:white;
overflow-x:hidden;
}

/* ===== DISNEY+ STYLE HEADER ===== */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

.logo{
color:#FFE81F;
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

.nav a{
color:#aaa;
margin:0 10px;
text-decoration:none;
font-size:14px;
}
.nav a:hover{color:white;}

/* ===== HERO BANNER ===== */
.hero{
height:300px;
background:linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.2)),
url('https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=1500&q=80');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
padding:30px;
}

.hero h1{
font-size:40px;
color:#FFE81F;
margin:0;
}
.hero p{
color:#ccc;
max-width:500px;
}

/* ===== ROW STYLE (DISNEY+) ===== */
.row{
padding:20px;
}
.row h2{
color:#FFE81F;
margin-bottom:10px;
}

.grid{
display:flex;
gap:15px;
overflow-x:auto;
padding-bottom:10px;
}

.card{
min-width:180px;
background:#1a1a1a;
border-radius:10px;
padding:10px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.08);
background:#222;
box-shadow:0 0 15px #FFE81F;
}

.card input{
transform:scale(1.2);
accent-color:#FFE81F;
}

.card label{
display:block;
margin-top:8px;
font-size:14px;
color:white;
}

.tag{
font-size:10px;
padding:2px 6px;
border-radius:4px;
background:#333;
color:#FFE81F;
display:inline-block;
margin-top:5px;
}

/* ===== PROGRESS BAR ===== */
.progress{
margin:20px;
background:#222;
border-radius:20px;
overflow:hidden;
height:18px;
}

#bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#FFE81F,#ffb703);
text-align:center;
font-size:12px;
color:black;
font-weight:bold;
transition:0.3s;
}

/* ===== STARS BACKGROUND ===== */
.stars{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
animation:move 120s linear infinite;
z-index:-1;
opacity:0.3;
}
@keyframes move{
from{transform:translateY(0)}
to{transform:translateY(-1000px)}
}
</style></head><body><div class="stars"></div><!-- HEADER --><div class="header">
<div class="logo">GALACTIC+</div>
<div class="nav">
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Series</a>
<a href="#">Watchlist</a>
</div>
</div><!-- HERO --><div class="hero">
<h1>Star Wars Universe</h1>
<p>Your cinematic watch tracker — built like Disney+ but for the galaxy far far away.</p>
</div><!-- PROGRESS --><div class="progress">
<div id="bar">0%</div>
</div><!-- ROW 1 --><div class="row">
<h2>Movies</h2>
<div class="grid"><div class="card"><input type="checkbox" id="ep4"><label for="ep4">A New Hope</label><div class="tag">Movie</div></div>
<div class="card"><input type="checkbox" id="ep5"><label for="ep5">Empire Strikes Back</label><div class="tag">Movie</div></div>
<div class="card"><input type="checkbox" id="ep6"><label for="ep6">Return of the Jedi</label><div class="tag">Movie</div></div></div>
</div><!-- ROW 2 --><div class="row">
<h2>Series</h2>
<div class="grid"><div class="card"><input type="checkbox" id="mando"><label for="mando">Mandalorian</label><div class="tag">Series</div></div>
<div class="card"><input type="checkbox" id="andor"><label for="andor">Andor</label><div class="tag">Series</div></div>
<div class="card"><input type="checkbox" id="ahsoka"><label for="ahsoka">Ahsoka</label><div class="tag">Series</div></div></div>
</div><script>
const boxes=document.querySelectorAll("input");
const bar=document.getElementById("bar");

window.onload=()=>{
boxes.forEach(b=>b.checked=localStorage.getItem(b.id)==="true");
update();
};

boxes.forEach(b=>{
b.addEventListener("change",()=>{
localStorage.setItem(b.id,b.checked);
update();
});
});

function update(){
let total=boxes.length;
let checked=[...boxes].filter(x=>x.checked).length;
let p=Math.round((checked/total)*100);
bar.style.width=p+"%";
bar.innerText=p+"%";
}
</script></body>
</html>
