<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Star Wars Watchlist</title>
    <style>
        :root { 
            --sith-red: #ff0000; 
            --deep-black: #050505; 
            --panel-bg: rgba(20, 20, 20, 0.9); 
        }

        body { 
            background: var(--deep-black) url('https://images.alphacoders.com/134/1341775.png') no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            line-height: 1.6; 
            margin: 0;
        }

        /* Dark overlay for readability */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .container { max-width: 850px; margin: 0 auto; }

        h1 { 
            color: var(--sith-red); 
            text-align: center; 
            font-size: 3rem; 
            margin-bottom: 0; 
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        /* Progress Bar Styling: Black background, Red text */
        .progress-container { 
            background: #000; 
            border-radius: 5px; 
            height: 35px; 
            width: 100%; 
            margin: 25px 0; 
            position: sticky; 
            top: 10px; 
            z-index: 100; 
            border: 2px solid var(--sith-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        #progress-bar { 
            height: 100%; 
            width: 0%; 
            background: #000; 
            border-right: 3px solid var(--sith-red);
            transition: 0.5s ease-in-out; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--sith-red); 
            font-weight: bold; 
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .phase { 
            background: var(--panel-bg); 
            border-radius: 5px; 
            padding: 25px; 
            margin-bottom: 30px; 
            border: 1px solid #333;
            border-left: 5px solid var(--sith-red); 
        }

        h2 { 
            color: var(--sith-red); 
            margin-top: 0; 
            text-transform: uppercase; 
            font-size: 1.4rem; 
            letter-spacing: 2px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        h3 { 
            color: #ccc; 
            margin: 20px 0 10px 0; 
            font-size: 1.1rem; 
            border-bottom: 1px solid #333; 
            padding-bottom: 5px;
            text-transform: italic;
        }

        .item { 
            display: flex; 
            align-items: flex-start; 
            padding: 12px; 
            border-bottom: 1px solid #222; 
            transition: background 0.3s;
        }

        .item:hover { background: rgba(255, 0, 0, 0.05); }
        .item:last-child { border-bottom: none; }

        input[type="checkbox"] { 
            width: 22px; 
            height: 22px; 
            cursor: pointer; 
            accent-color: var(--sith-red); 
            margin-top: 3px; 
        }

        label { 
            margin-left: 15px; 
            cursor: pointer; 
            flex-grow: 1; 
            font-weight: 500; 
            color: #eee;
        }

        .tag { 
            font-size: 0.7rem; 
            padding: 2px 8px; 
            border-radius: 3px; 
            margin-left: 8px; 
            text-transform: uppercase; 
            vertical-align: middle; 
            font-weight: bold;
        }

        .tag-m { background: var(--sith-red); color: white; } 
        .tag-s { background: #444; color: white; } 
        .tag-u { border: 1px solid var(--sith-red); color: var(--sith-red); }

        .note { 
            font-size: 0.85rem; 
            color: #888; 
            display: block; 
            margin-top: 4px; 
            font-style: italic; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>STAR WARS</h1>
    <p style="text-align: center; color: #aaa; text-transform: uppercase; letter-spacing: 2px;">The Dark Side Watchlist</p>

    <div class="progress-container">
        <div id="progress-bar">0%</div>
    </div>

    <div class="phase">
        <h2>Phase 1: The Foundation</h2>
        <div class="item"><input type="checkbox" id="e4"><label for="e4">Episode IV: A New Hope <span class="tag tag-m">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="e5"><label for="e5">Episode V: The Empire Strikes Back <span class="tag tag-m">Movie</span><span class="note">MAJOR PLOT TWIST - Do not search online!</span></label></div>
        <div class="item"><input type="checkbox" id="e6"><label for="e6">Episode VI: Return of the Jedi <span class="tag tag-m">Movie</span></label></div>
    </div>

    <div class="phase">
        <h2>Phase 2: The Prequel Era</h2>
        <div class="item"><input type="checkbox" id="e1"><label for="e1">Episode I: The Phantom Menace <span class="tag tag-m">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="e2"><label for="e2">Episode II: Attack of the Clones <span class="tag tag-m">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="cw-m"><label for="cw-m">The Clone Wars (Pilot Movie) <span class="tag tag-m">Animated</span></label></div>
        
        <h3>The Clone Wars: Part 1</h3>
        <div class="item"><input type="checkbox" id="cw-s17"><label for="cw-s17">Seasons 1 through Season 7, Episode 8 <span class="tag tag-s">Series</span></label></div>

        <div class="item"><input type="checkbox" id="e3"><label for="e3">Episode III: Revenge of the Sith <span class="tag tag-m">Movie</span></label></div>

        <h3>The Clone Wars: The Finale</h3>
        <div class="item"><input type="checkbox" id="cw-fin"><label for="cw-fin">Season 7, Episode 9 through Episode 12 <span class="tag tag-s">Finale</span><span class="note">Watch this immediately after Episode III.</span></label></div>
    </div>

    <div class="phase">
        <h2>Phase 3: The Dark Times</h2>
        <div class="item"><input type="checkbox" id="bb"><label for="bb">The Bad Batch (Seasons 1-3) <span class="tag tag-s">Animated</span></label></div>
        <div class="item"><input type="checkbox" id="t-jedi"><label for="t-jedi">Tales of the Jedi <span class="tag tag-s">Shorts</span></label></div>
        <div class="item"><input type="checkbox" id="maul-sl"><label for="maul-sl">Maul: Shadow Lord <span class="tag tag-u">Upcoming 2026</span></label></div>
        <div class="item"><input type="checkbox" id="solo"><label for="solo">Solo: A Star Wars Story <span class="tag tag-m">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="kenobi"><label for="kenobi">Obi-Wan Kenobi <span class="tag tag-s">Series</span></label></div>
        <div class="item"><input type="checkbox" id="andor12"><label for="andor12">Andor (Seasons 1-2) <span class="tag tag-s">Series</span></label></div>
        <div class="item"><input type="checkbox" id="rebels"><label for="rebels">Star Wars Rebels (Seasons 1-4) <span class="tag tag-s">Animated</span></label></div>
        <div class="item"><input type="checkbox" id="r1"><label for="r1">Rogue One <span class="tag tag-m">Movie</span></label></div>
    </div>

    <div class="phase">
        <h2>Phase 4: The New Republic (Mandoverse)</h2>
        <div class="item"><input type="checkbox" id="m12"><label for="m12">The Mandalorian (Seasons 1-2) <span class="tag tag-s">Series</span></label></div>
        <div class="item"><input type="checkbox" id="boba"><label for="boba">The Book of Boba Fett <span class="tag tag-s">Series</span></label></div>
        <div class="item"><input type="checkbox" id="m3"><label for="m3">The Mandalorian (Season 3) <span class="tag tag-s">Series</span></label></div>
        <div class="item"><input type="checkbox" id="ahsoka1"><label for="ahsoka1">Ahsoka (Season 1) <span class="tag tag-s">Series</span></label></div>
        <div class="item"><input type="checkbox" id="skel"><label for="skel">Skeleton Crew <span class="tag tag-s">Series</span></label></div>
        <div class="item"><input type="checkbox" id="m-movie"><label for="m-movie">The Mandalorian & Grogu <span class="tag tag-u">Movie 2026</span></label></div>
        <div class="item"><input type="checkbox" id="ahsoka2"><label for="ahsoka2">Ahsoka (Season 2) <span class="tag tag-u">Late 2026</span></label></div>
    </div>

    <div class="phase">
        <h2>Phase 5: The Legacy Era</h2>
        <div class="item"><input type="checkbox" id="resis"><label for="resis">Star Wars Resistance <span class="tag tag-s">Animated</span></label></div>
        <div class="item"><input type="checkbox" id="e7"><label for="e7">Episode VII: The Force Awakens <span class="tag tag-m">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="e8"><label for="e8">Episode VIII: The Last Jedi <span class="tag tag-m">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="e9"><label for="e9">Episode IX: The Rise of Skywalker <span class="tag tag-m">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="starfighter"><label for="starfighter">Star Wars: Starfighter <span class="tag tag-u">May 2027</span></label></div>
        <div class="item"><input type="checkbox" id="rey-njo"><label for="rey-njo">New Jedi Order (Rey Movie) <span class="tag tag-u">Dec 2027</span></label></div>
    </div>

    <div class="phase">
        <h2>Standalone Lore</h2>
        <div class="item"><input type="checkbox" id="acolyte"><label for="acolyte">The Acolyte <span class="tag tag-s">Series</span></label></div>
        <div class="item"><input type="checkbox" id="y-jedi"><label for="y-jedi">Young Jedi Adventures <span class="tag tag-s">Kids</span></label></div>
        <div class="item"><input type="checkbox" id="t-emp"><label for="t-emp">Tales of the Empire <span class="tag tag-s">Shorts</span></label></div>
        <div class="item"><input type="checkbox" id="vis"><label for="vis">Star Wars Visions <span class="tag tag-s">Anthology</span></label></div>
    </div>
</div>

<script>
    const cb = document.querySelectorAll('input[type="checkbox"]');
    const bar = document.getElementById('progress-bar');

    window.onload = () => {
        cb.forEach(box => { if(localStorage.getItem(box.id) === 'true') box.checked = true; });
        update();
    };

    cb.forEach(box => {
        box.addEventListener('change', () => {
            localStorage.setItem(box.id, box.checked);
            update();
        });
    });

    function update() {
        const total = cb.length;
        const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
        const percent = Math.round((checked / total) * 100);
        bar.style.width = percent + '%';
        bar.innerText = percent + '% COMPLETED';
    }
</script>

</body>
</html>
