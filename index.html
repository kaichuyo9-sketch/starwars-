<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAR WARS — The Dark Side Watchlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #030510; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }

    @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .phase-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .phase-card:hover { transform: translateY(-4px); }

    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .item-row:hover { background: rgba(255,255,255,0.04); }
    .item-row.done { opacity: 0.45; }

    .check-box {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid rgba(255,255,255,0.2);
      background: transparent;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 11px;
      font-weight: 900;
      color: #000;
    }
    .check-box:hover { transform: scale(1.2); }

    .item-title {
      font-size: 13px;
      color: #ddd;
      font-family: 'Exo 2', sans-serif;
      font-weight: 500;
      letter-spacing: 0.3px;
      line-height: 1.4;
      transition: all 0.2s;
    }
    .item-row.done .item-title { color: #555; text-decoration: line-through; }

    .tag {
      font-size: 9px;
      letter-spacing: 1px;
      border-radius: 4px;
      padding: 2px 7px;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
      font-family: 'Exo 2', sans-serif;
      white-space: nowrap;
    }

    .phase-bar-bg { height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; margin-top: 10px; }
    .phase-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

    .grid {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 20px 20px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      animation: fadeSlideIn 0.8s ease forwards;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #030510; }
    ::-webkit-scrollbar-thumb { background: rgba(255,232,31,0.27); border-radius: 3px; }
  </style>
</head>
<body>

<div id="stars"></div>

<!-- Header -->
<div style="position:relative;z-index:1;text-align:center;padding:60px 20px 30px">
  <div style="font-size:11px;letter-spacing:8px;color:rgba(255,232,31,0.6);margin-bottom:8px;font-family:'Exo 2',sans-serif">A LONG TIME AGO IN A GALAXY FAR FAR AWAY...</div>
  <h1 style="font-size:clamp(36px,8vw,80px);font-weight:900;color:#FFE81F;letter-spacing:0.12em;text-shadow:0 0 40px rgba(255,232,31,0.53),0 0 80px rgba(255,232,31,0.27);line-height:1;margin-bottom:6px">STAR WARS</h1>
  <div style="font-size:13px;letter-spacing:5px;color:#aaa;font-family:'Exo 2',sans-serif;margin-bottom:40px">THE DARK SIDE WATCHLIST</div>

  <div style="max-width:500px;margin:0 auto;padding:0 20px">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="color:#FFE81F;font-size:12px;letter-spacing:2px">PROGRESS</span>
      <span id="progress-label" style="color:#FFE81F;font-size:12px">0/38 — 0%</span>
    </div>
    <div style="height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden">
      <div id="progress-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#FFE81F,#FF9900);border-radius:3px;transition:width 0.5s ease;box-shadow:0 0 12px rgba(255,232,31,0.53)"></div>
    </div>
  </div>
</div>

<!-- Grid -->
<div class="grid" id="grid"></div>

<!-- Footer -->
<div style="position:relative;z-index:1;text-align:center;padding-bottom:40px;color:rgba(255,255,255,0.13);font-size:11px;letter-spacing:3px;font-family:'Exo 2',sans-serif">
  MAY THE FORCE BE WITH YOU
</div>

<script>
const phases = [
  {
    id: 0, title: "Phase 0", subtitle: "The High Republic Era", color: "#A0E4FF",
    items: [
      { title: "Young Jedi Adventures", type: "Kids" },
      { title: "The Acolyte", type: "Series" },
    ]
  },
  {
    id: 1, title: "Phase 1", subtitle: "The Foundation", color: "#FFE81F",
    items: [
      { title: "Episode IV: A New Hope", type: "Movie" },
      { title: "Episode V: The Empire Strikes Back", type: "Movie" },
      { title: "Episode VI: Return of the Jedi", type: "Movie" },
    ]
  },
  {
    id: 2, title: "Phase 2", subtitle: "The Prequel Era", color: "#00BFFF",
    items: [
      { title: "Episode I: The Phantom Menace", type: "Movie" },
      { title: "Episode II: Attack of the Clones", type: "Movie" },
      { title: "The Clone Wars (Pilot Movie)", type: "Animated" },
      { title: "The Clone Wars — Seasons 1–7, Ep 1–8", type: "Series" },
      { title: "Episode III: Revenge of the Sith", type: "Movie" },
      { title: "The Clone Wars — Season 7, Ep 9–12", type: "Finale" },
    ]
  },
  {
    id: 3, title: "Phase 3", subtitle: "The Dark Times", color: "#FF4444",
    items: [
      { title: "The Bad Batch (Seasons 1–3)", type: "Animated" },
      { title: "Tales of the Jedi", type: "Shorts" },
      { title: "Tales of the Empire", type: "Shorts" },
      { title: "Tales of the Underworld", type: "Shorts" },
      { title: "Maul: Shadow Lord", type: "2026" },
      { title: "Solo: A Star Wars Story", type: "Movie" },
      { title: "Obi-Wan Kenobi", type: "Series" },
      { title: "Andor (Seasons 1–2)", type: "Series" },
      { title: "Star Wars Rebels (Seasons 1–4)", type: "Animated" },
      { title: "Rogue One", type: "Movie" },
    ]
  },
  {
    id: 4, title: "Phase 4", subtitle: "The New Republic", color: "#00FF9F",
    items: [
      { title: "The Mandalorian (Seasons 1–2)", type: "Series" },
      { title: "The Book of Boba Fett", type: "Series" },
      { title: "The Mandalorian (Season 3)", type: "Series" },
      { title: "Ahsoka (Season 1)", type: "Series" },
      { title: "Skeleton Crew", type: "Series" },
      { title: "The Mandalorian & Grogu", type: "Movie 2026" },
      { title: "Ahsoka (Season 2)", type: "Late 2026" },
    ]
  },
  {
    id: 5, title: "Phase 5", subtitle: "The Legacy Era", color: "#CC88FF",
    items: [
      { title: "Star Wars Resistance", type: "Animated" },
      { title: "Episode VII: The Force Awakens", type: "Movie" },
      { title: "Episode VIII: The Last Jedi", type: "Movie" },
      { title: "Episode IX: The Rise of Skywalker", type: "Movie" },
      { title: "Star Wars: Starfighter", type: "May 2027" },
      { title: "New Jedi Order (Rey Movie)", type: "Dec 2027" },
    ]
  },
  {
    id: 6, title: "Standalone", subtitle: "Anthology & Visions", color: "#FF9900",
    items: [
      { title: "Star Wars Visions (Seasons 1–2)", type: "Anthology" },
      { title: "Star Wars Visions Presents: The Ninth Jedi", type: "2026 Anime" },
    ]
  }
];

const typeColors = {
  Movie: "#FFE81F", Animated: "#00BFFF", Series: "#00FF9F",
  Shorts: "#FF9900", Finale: "#FF4444", "2026": "#888",
  "Movie 2026": "#888", "Late 2026": "#888", "May 2027": "#888",
  "Dec 2027": "#888", Anthology: "#CC88FF", Kids: "#A0E4FF", "2026 Anime": "#CC88FF"
};

const checked = {};
const totalItems = phases.reduce((a, p) => a + p.items.length, 0);

function updateProgress() {
  const count = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((count / totalItems) * 100);
  document.getElementById('progress-label').textContent = `${count}/${totalItems} — ${pct}%`;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updatePhaseBar(phaseId, color) {
  const phase = phases.find(p => p.id === phaseId);
  const done = phase.items.filter(item => checked[`${phaseId}-${item.title}`]).length;
  const pct = Math.round((done / phase.items.length) * 100);
  const bar = document.getElementById(`pbar-${phaseId}`);
  const label = document.getElementById(`plabel-${phaseId}`);
  if (bar) bar.style.width = pct + '%';
  if (label) label.textContent = pct + '%';
}

function toggleItem(key, phaseId, color) {
  checked[key] = !checked[key];
  const row = document.getElementById('row-' + key);
  const box = document.getElementById('box-' + key);
  if (checked[key]) {
    row.classList.add('done');
    box.style.background = color;
    box.style.border = `2px solid ${color}`;
    box.style.boxShadow = `0 0 8px ${color}88`;
    box.textContent = '✓';
  } else {
    row.classList.remove('done');
    box.style.background = 'transparent';
    box.style.border = '2px solid rgba(255,255,255,0.2)';
    box.style.boxShadow = 'none';
    box.textContent = '';
  }
  updateProgress();
  updatePhaseBar(phaseId, color);
}

// Build stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  const size = Math.random() * 2 + 0.5;
  const delay = Math.random() * 4;
  s.style.cssText = `position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;border-radius:50%;background:white;opacity:${Math.random()*0.7+0.3};animation:twinkle ${2+delay}s ease-in-out infinite alternate`;
  starsEl.appendChild(s);
}

// Build grid
const grid = document.getElementById('grid');
phases.forEach(phase => {
  const card = document.createElement('div');
  card.className = 'phase-card';
  card.style.border = `1px solid ${phase.color}33`;
  card.style.boxShadow = `0 4px 30px ${phase.color}11`;

  let itemsHTML = phase.items.map(item => {
    const key = `${phase.id}-${item.title}`;
    const tagColor = typeColors[item.type] || '#888';
    return `
      <div class="item-row" id="row-${key}" onclick="toggleItem('${key}', ${phase.id}, '${phase.color}')">
        <div class="check-box" id="box-${key}"></div>
        <div style="flex:1;min-width:0">
          <div class="item-title">${item.title}</div>
        </div>
        <div class="tag" style="color:${tagColor};background:${tagColor}18;border:1px solid ${tagColor}33">${item.type}</div>
      </div>`;
  }).join('');

  card.innerHTML = `
    <div style="padding:18px 20px 14px;border-bottom:1px solid ${phase.color}22;background:linear-gradient(135deg,${phase.color}11,transparent)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:10px;letter-spacing:4px;color:${phase.color};opacity:0.7;margin-bottom:3px;font-family:'Exo 2',sans-serif">${phase.title.toUpperCase()}</div>
          <div style="font-size:16px;font-weight:700;color:#fff;letter-spacing:1px">${phase.subtitle}</div>
        </div>
        <div id="plabel-${phase.id}" style="font-size:11px;color:${phase.color};background:${phase.color}22;border:1px solid ${phase.color}44;border-radius:20px;padding:3px 10px;font-family:'Exo 2',sans-serif;white-space:nowrap">0%</div>
      </div>
      <div class="phase-bar-bg">
        <div class="phase-bar-fill" id="pbar-${phase.id}" style="width:0%;background:${phase.color};box-shadow:0 0 8px ${phase.color}"></div>
      </div>
    </div>
    <div style="padding:8px 0">${itemsHTML}</div>
  `;
  grid.appendChild(card);
});

updateProgress();
</script>
</body>
</html>
