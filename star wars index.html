<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Watchlist | Star Wars Guide</title>
    <style>
        :root {
            --star-wars-yellow: #FFE81F;
            --space-black: #050505;
            --panel-bg: #1a1a1a;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--space-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                              radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: var(--star-wars-yellow);
            text-align: center;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .progress-container {
            background: #333;
            border-radius: 20px;
            height: 25px;
            width: 100%;
            margin-bottom: 30px;
            position: sticky;
            top: 10px;
            z-index: 100;
            box-shadow: 0 0 15px rgba(255, 232, 31, 0.3);
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--star-wars-yellow);
            border-radius: 20px;
            transition: width 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .phase {
            background: var(--panel-bg);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        h2 {
            color: var(--star-wars-yellow);
            border-bottom: 2px solid var(--star-wars-yellow);
            padding-bottom: 10px;
            margin-top: 0;
        }

        h3 {
            color: #4da6ff;
            font-size: 1.1rem;
            margin: 15px 0 10px 0;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #2a2a2a;
            transition: background 0.2s;
        }

        .item:hover {
            background: #252525;
        }

        .item:last-child { border-bottom: none; }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--star-wars-yellow);
        }

        label {
            margin-left: 15px;
            cursor: pointer;
            flex-grow: 1;
        }

        .tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .tag-movie { background: #e63946; color: white; }
        .tag-series { background: #457b9d; color: white; }
        .tag-upcoming { background: #ffb703; color: black; }

        .note {
            font-size: 0.85rem;
            color: var(--text-gray);
            font-style: italic;
            margin-top: 4px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Star Wars</h1>
    <p style="text-align: center; color: var(--text-gray);">Your ultimate plot-logic watch guide</p>

    <div class="progress-container">
        <div id="progress-bar">0% Complete</div>
    </div>

    <div class="phase">
        <h2>Phase 1: The Foundation</h2>
        <div class="item">
            <input type="checkbox" id="ep4"><label for="ep4">Episode IV: A New Hope <span class="tag tag-movie">Movie</span></label>
        </div>
        <div class="item">
            <input type="checkbox" id="ep5"><label for="ep5">Episode V: The Empire Strikes Back <span class="tag tag-movie">Movie</span><span class="note">Crucial Reveal - Don't Google!</span></label>
        </div>
        <div class="item">
            <input type="checkbox" id="ep6"><label for="ep6">Episode VI: Return of the Jedi <span class="tag tag-movie">Movie</span></label>
        </div>
    </div>

    <div class="phase">
        <h2>Phase 2: The Fall</h2>
        <div class="item">
            <input type="checkbox" id="ep1"><label for="ep1">Episode I: The Phantom Menace <span class="tag tag-movie">Movie</span></label>
        </div>
        <div class="item">
            <input type="checkbox" id="ep2"><label for="ep2">Episode II: Attack of the Clones <span class="tag tag-movie">Movie</span></label>
        </div>
        <div class="item">
            <input type="checkbox" id="cw-movie"><label for="cw-movie">The Clone Wars <span class="tag tag-movie">Animated Movie</span></label>
        </div>
        
        <h3>The Clone Wars: The Great War</h3>
        <div class="item">
            <input type="checkbox" id="cw-pt1"><label for="cw-pt1">Seasons 1 through Season 7, Episode 8 <span class="tag tag-series">Animated</span></label>
        </div>

        <div class="item">
            <input type="checkbox" id="ep3"><label for="ep3">Episode III: Revenge of the Sith <span class="tag tag-movie">Movie</span></label>
        </div>

        <h3>The Clone Wars: The Finale</h3>
        <div class="item">
            <input type="checkbox" id="cw-pt2"><label for="cw-pt2">Season 7, Episodes 9–12 (Siege of Mandalore) <span class="tag tag-series">Animated</span></label>
        </div>
    </div>

    <div class="phase">
        <h2>Phase 3: The Dark Times</h2>
        <div class="item"><input type="checkbox" id="bb"><label for="bb">The Bad Batch (Seasons 1-3) <span class="tag tag-series">Animated</span></label></div>
        <div class="item"><input type="checkbox" id="tj"><label for="tj">Tales of the Jedi <span class="tag tag-series">Shorts</span></label></div>
        <div class="item"><input type="checkbox" id="maul"><label for="maul">Maul: Shadow Lord <span class="tag tag-upcoming">April 2026</span></label></div>
        <div class="item"><input type="checkbox" id="solo"><label for="solo">Solo: A Star Wars Story <span class="tag tag-movie">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="kenobi"><label for="kenobi">Obi-Wan Kenobi <span class="tag tag-series">Series</span></label></div>
        <div class="item"><input type="checkbox" id="andor"><label for="andor">Andor (Seasons 1-2) <span class="tag tag-series">Series</span></label></div>
        <div class="item"><input type="checkbox" id="rebels"><label for="rebels">Star Wars Rebels (Seasons 1-4) <span class="tag tag-series">Animated</span></label></div>
        <div class="item"><input type="checkbox" id="rogue1"><label for="rogue1">Rogue One <span class="tag tag-movie">Movie</span></label></div>
    </div>

    <div class="phase">
        <h2>Phase 4: The New Republic</h2>
        <div class="item"><input type="checkbox" id="mando12"><label for="mando12">The Mandalorian (Seasons 1-2) <span class="tag tag-series">Series</span></label></div>
        <div class="item"><input type="checkbox" id="boba"><label for="boba">The Book of Boba Fett <span class="tag tag-series">Series</span></label></div>
        <div class="item"><input type="checkbox" id="mando3"><label for="mando3">The Mandalorian (Season 3) <span class="tag tag-series">Series</span></label></div>
        <div class="item"><input type="checkbox" id="ahsoka"><label for="ahsoka">Ahsoka (Season 1) <span class="tag tag-series">Series</span></label></div>
        <div class="item"><input type="checkbox" id="skeleton"><label for="skeleton">Skeleton Crew <span class="tag tag-series">Series</span></label></div>
        <div class="item"><input type="checkbox" id="mandofilm"><label for="mandofilm">The Mandalorian & Grogu Movie <span class="tag tag-upcoming">May 2026</span></label></div>
        <div class="item"><input type="checkbox" id="ahsoka2"><label for="ahsoka2">Ahsoka (Season 2) <span class="tag tag-upcoming">Late 2026</span></label></div>
    </div>

    <div class="phase">
        <h2>Phase 5: Legacy & Future</h2>
        <div class="item"><input type="checkbox" id="res"><label for="res">Star Wars Resistance <span class="tag tag-series">Animated</span></label></div>
        <div class="item"><input type="checkbox" id="ep7"><label for="ep7">Episode VII: The Force Awakens <span class="tag tag-movie">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="ep8"><label for="ep8">Episode VIII: The Last Jedi <span class="tag tag-movie">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="ep9"><label for="ep9">Episode IX: The Rise of Skywalker <span class="tag tag-movie">Movie</span></label></div>
        <div class="item"><input type="checkbox" id="reyfilm"><label for="reyfilm">New Jedi Order: Rey Movie <span class="tag tag-upcoming">Dec 2027</span></label></div>
    </div>
</div>

<script>
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const progressBar = document.getElementById('progress-bar');

    // Load progress from LocalStorage
    window.onload = () => {
        checkboxes.forEach(box => {
            const status = localStorage.getItem(box.id);
            if (status === 'true') box.checked = true;
        });
        updateProgress();
    };

    // Save progress on click
    checkboxes.forEach(box => {
        box.addEventListener('change', () => {
            localStorage.setItem(box.id, box.checked);
            updateProgress();
        });
    });

    function updateProgress() {
        const total = checkboxes.length;
        const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
        const percent = Math.round((checked / total) * 100);
        progressBar.style.width = percent + '%';
        progressBar.innerText = percent + '% Complete';
    }
</script>

</body>
</html>
